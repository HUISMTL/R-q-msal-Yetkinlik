# docker-compose.yml
version: "3.9"

services:

  # ─── PostgreSQL ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: reqemsal_yetkinlik
      POSTGRES_USER: reqemsal_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-CHANGE_THIS_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reqemsal_user -d reqemsal_yetkinlik"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── Backend API ────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://reqemsal_user:${DB_PASSWORD:-CHANGE_THIS_PASSWORD}@db:5432/reqemsal_yetkinlik
      JWT_SECRET: ${JWT_SECRET:-CHANGE_THIS_JWT_SECRET_MIN_32_CHARS}
      JWT_EXPIRES_IN: 8h
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@2026!}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    volumes:
      - ./backend/prisma:/app/prisma
    networks:
      - internal
    expose:
      - "3001"

  # ─── Frontend (React build) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    networks:
      - internal
    expose:
      - "80"

  # ─── Nginx reverse proxy ────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # SSL sertifikatları
      - nginxlogs:/var/log/nginx
    networks:
      - internal

volumes:
  pgdata:
  nginxlogs:

networks:
  internal:
    driver: bridge
